<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>

    <h2>Student Registration</h2>

    <form>
        Full Name:<br>
        <input type="text"><br><br>

        Email:<br>
        <input type="email"><br><br>

        Department:<br>
        <input type="text"><br><br>

        Password:<br>
        <input type="password"><br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </form>

</body>
</html>
